<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EcoSphere – List Items</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>

:root{
  --green:#18a118;
  --green-dark:#138313;
  --green-light:#dcfce7;
  --navy:#1b2636;
  --bg:#f3f5f4;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
  background:var(--bg);
}

/* HEADER */

.header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:60px;
  background:var(--green);
  display:flex;
  align-items:center;
  gap:14px;
  padding:0 20px;
  z-index:1000;
}

.hamburger{
  display:none;
  background:none;
  border:none;
  color:#fff;
  font-size:20px;
  cursor:pointer;
  padding:6px;
  border-radius:6px;
}

.hamburger:hover{
  background:rgba(255,255,255,0.15);
}

.logo{
  flex:1;
  color:#fff;
  text-decoration:none;
  font-size:1.2rem;
  font-weight:700;
}

.logo i{
  color:gold;
  margin-right:6px;
}

.profile-link{
  color:#fff;
  font-size:22px;
  text-decoration:none;
}

/* OVERLAY */

.overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  z-index:998;
}

.overlay.show{
  display:block;
}

/* SIDEBAR */


.sidebar{
  position:fixed;
  top:0;
  left:0;
  width:210px;
  height:100vh;
  background:#1b2636;
  z-index:999;
  display:flex;
  flex-direction:column;
  padding-top:60px;
  transition:0.3s;
}

.sidebar-close{
  display:none;
}

.sidebar-brand{
  padding:18px 20px 16px;
  font-size:0.8rem;
  font-weight:700;
  color:rgba(255,255,255,0.35);
  text-transform:uppercase;
  letter-spacing:1px;
  border-bottom:1px solid rgba(255,255,255,0.06);
  margin-bottom:8px;
}

.sidebar a{
  display:flex;
  align-items:center;
  gap:10px;
  padding:11px 20px;
  color:rgba(255,255,255,0.65);
  text-decoration:none;
  font-size:0.88rem;
  font-weight:500;
  transition:0.2s;
}

.sidebar a i{
  width:16px;
  text-align:center;
}

.sidebar a:hover{
  color:#fff;
  background:rgba(255,255,255,0.07);
  padding-left:26px;
}

.sidebar a.active{
  color:#4ade80;
  background:rgba(74,222,128,0.1);
}

.sidebar a.logout{
  color:#f87171;
}
/* LAYOUT */

.layout{
  margin-left:220px;
  margin-top:60px;
}

.content{
  padding:25px;
}

/* PAGE TITLE */

.page-title{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:12px;
  margin-bottom:25px;
}

.page-title-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.page-title-icon{
  width:45px;
  height:45px;
  border-radius:10px;
  background:var(--green-light);
  color:var(--green-dark);
  display:flex;
  align-items:center;
  justify-content:center;
}

.page-title h2 span{
  color:var(--green);
}

/* BUTTON */

.btn-add{
  background:var(--green);
  color:#fff;
  border:none;
  padding:10px 18px;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.btn-add:hover{
  background:var(--green-dark);
}

/* GRID */

.items-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
}

/* CARD */

.item-card{
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  transition:0.3s;
}

.item-card:hover{
  transform:translateY(-4px);
}

/* IMAGE */

.item-img-wrap{
  height:180px;
  overflow:hidden;
}

.item-img-wrap img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* BODY */

.item-body{
  padding:16px;
}

.item-name{
  font-size:1rem;
  font-weight:700;
  margin-bottom:6px;
}

.item-cat{
  color:#666;
  font-size:0.82rem;
  margin-bottom:12px;
}

.item-meta{
  display:flex;
  justify-content:space-between;
  margin-bottom:14px;
}

.item-price{
  color:var(--green-dark);
  font-weight:700;
}

/* BUTTONS */

.item-actions{
  display:flex;
  gap:8px;
}

.item-actions button{
  flex:1;
  border:none;
  padding:8px;
  border-radius:7px;
  cursor:pointer;
  font-weight:600;
}

.btn-edit{
  background:#dbeafe;
}

.btn-toggle{
  background:#dcfce7;
}

.btn-delete{
  background:#fee2e2;
}

.modal{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.45);
  padding:20px;
  z-index:1001;
}

.modal.show{
  display:flex;
}

.modal-content{
  width:100%;
  max-width:420px;
  background:#fff;
  border-radius:18px;
  padding:24px;
  box-shadow:0 18px 40px rgba(0,0,0,0.12);
}

.modal-content h3{
  margin-bottom:18px;
  font-size:1.1rem;
  color:#1b2636;
}

.modal-content label{
  display:block;
  margin-bottom:14px;
  font-size:0.9rem;
  color:#374151;
}

.modal-content input{
  width:100%;
  padding:10px 12px;
  margin-top:6px;
  border:1px solid #d1d5db;
  border-radius:10px;
  background:#f8fafc;
}

.form-actions{
  display:flex;
  gap:10px;
  margin-top:18px;
}

.form-actions .btn-add,
.form-actions .btn-delete{
  flex:1;
}

  .sidebar{
    transform:translateX(-100%);
    padding-top:0;
  }

  .sidebar.open{
    transform:translateX(0);
  }

  .sidebar-close{
    display:block;
  }

  .layout{
    margin-left:0;
  }

  .content{
    padding:18px 14px;
  }
}

</style>
</head>

<body>

<!-- HEADER -->

<header class="header">

  <button class="hamburger" onclick="toggleSidebar()">
    <i class="fas fa-bars"></i>
  </button>

  <a href="#" class="logo">
    <i class="fas fa-leaf"></i> EcoSphere
  </a>

  <a href="./seller_profile.html" class="profile-link">
    <i class="fas fa-user-circle"></i>
  </a>

</header>

<!-- OVERLAY -->

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->

<aside class="sidebar" id="sidebar">

  <button class="sidebar-close" onclick="closeSidebar()">
    <i class="fas fa-times"></i>
  </button>

  <div class="sidebar-brand">
    Seller Panel
  </div>

  <a href="./seller.html">
    <i class="fas fa-home"></i>
    Dashboard
  </a>

  <a href="./selle_orders.html">
    <i class="fas fa-shopping-bag"></i>
    Orders
  </a>

  <a href="./selle_items.html" class="active">
    <i class="fas fa-box"></i>
    List Items
  </a>

  <a href="./seller_profile.html" class="logout">
    <i class="fas fa-sign-out-alt"></i>
    Logout
  </a>

</aside>

<!-- LAYOUT -->

<div class="layout">

<div class="content">

<div class="page-title">

<div class="page-title-left">

<div class="page-title-icon">
<i class="fas fa-box-open"></i>
</div>

<h2>Listed <span>Items</span></h2>

</div>

<button id="add-item-button" class="btn-add" type="button" onclick="openAddItemModal()">
<i class="fas fa-plus"></i> Add Item
</button>

</div>

<div class="modal" id="item-modal">
  <div class="modal-content">
    <h3>Add New Item</h3>
    <form id="item-form" onsubmit="return false;">
      <label>
        Item Name
        <input type="text" id="item-name" placeholder="Plastic Bottles" required>
      </label>
      <label>
        Category
        <input type="text" id="item-category" placeholder="Plastic" required>
      </label>
      <label>
        Price
        <input type="text" id="item-price" placeholder="₹12/kg" required>
      </label>
      <label>
        Quantity
        <input type="text" id="item-quantity" placeholder="350kg" required>
      </label>
      <label>
        Image URL
        <input type="url" id="item-image" placeholder="https://example.com/image.jpg" required>
      </label>
      <div class="form-actions">
        <button type="button" class="btn-add" onclick="saveItem()">Save Item</button>
        <button type="button" class="btn-delete" onclick="closeItemModal()">Cancel</button>
      </div>
    </form>
  </div>
</div>

<!-- GRID -->

<div class="items-grid">

  <!-- CARD 1 -->

  <div class="item-card">

    <div class="item-img-wrap">
      <img src=https://tse4.mm.bing.net/th/id/OIP.RDCmX8JIAoa1EE-n9WBiGwHaFW?cb=thfvnext&rs=1&pid=ImgDetMain&o=7&rm=3 alt="">
    </div>

    <div class="item-body">

      <div class="item-name">Plastic Bottles</div>

      <div class="item-cat">Plastic</div>

      <div class="item-meta">
        <div class="item-price">₹12/kg</div>
        <div>350kg</div>
      </div>

      <div class="item-actions">
        <button class="btn-edit">Edit</button>
        <button class="btn-toggle">Active</button>
        <button class="btn-delete">Delete</button>
      </div>

    </div>

  </div>

  <!-- CARD 2 -->

  <div class="item-card">

    <div class="item-img-wrap">
      <img src="https://5.imimg.com/data5/SELLER/Default/2022/6/VY/BS/TG/79268969/newspaper-waste-500x500.jpg" alt="">
    </div>

    <div class="item-body">

      <div class="item-name">Old Newspapers</div>

      <div class="item-cat">Paper</div>

      <div class="item-meta">
        <div class="item-price">₹8/kg</div>
        <div>200kg</div>
      </div>

      <div class="item-actions">
        <button class="btn-edit">Edit</button>
        <button class="btn-toggle">Active</button>
        <button class="btn-delete">Delete</button>
      </div>

    </div>

  </div>

  <!-- CARD 3 -->

  <div class="item-card">

    <div class="item-img-wrap">
      <img src="https://img2.exportersindia.com/product_images/bc-full/2023/2/8230165/iron-metal-scrap-1675227906-6742182.jpeg" alt="">
    </div>

    <div class="item-body">

      <div class="item-name">Iron Scrap</div>

      <div class="item-cat">Metal</div>

      <div class="item-meta">
        <div class="item-price">₹28/kg</div>
        <div>600kg</div>
      </div>

      <div class="item-actions">
        <button class="btn-edit">Edit</button>
        <button class="btn-toggle">Active</button>
        <button class="btn-delete">Delete</button>
      </div>

    </div>

  </div>

  <!-- CARD 4 -->

  <div class="item-card">

    <div class="item-img-wrap">
      <img src="https://cdn.prod.website-files.com/61fa355c7ae67c2c0d81a4ec/649d3cbd57c468e5321a5a28_Wine-glass-colors-04.jpg" alt="">
    </div>

    <div class="item-body">

      <div class="item-name">Glass Bottles</div>

      <div class="item-cat">Glass</div>

      <div class="item-meta">
        <div class="item-price">₹6/kg</div>
        <div>120kg</div>
      </div>

      <div class="item-actions">
        <button class="btn-edit">Edit</button>
        <button class="btn-toggle">Active</button>
        <button class="btn-delete">Delete</button>
      </div>

    </div>

  </div>

</div>

</div>

</div>

<script>

let editingCard = null;

function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("show");
}

function closeSidebar(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
}

function openAddItemModal(){
  editingCard = null;
  const modal = document.getElementById('item-modal');
  modal.classList.add('show');
  document.getElementById('item-form').reset();
  document.getElementById('item-name').focus();
  document.querySelector('#item-modal .btn-add').textContent = 'Save Item';
}

function closeItemModal(){
  document.getElementById('item-modal').classList.remove('show');
  editingCard = null;
}

function saveItem(){
  const name = document.getElementById('item-name').value.trim();
  const category = document.getElementById('item-category').value.trim();
  const price = document.getElementById('item-price').value.trim();
  const quantity = document.getElementById('item-quantity').value.trim();
  const image = document.getElementById('item-image').value.trim();

  if(!name || !category || !price || !quantity || !image){
    alert('Please fill in all fields.');
    return;
  }

  if(editingCard){
    editingCard.querySelector('.item-name').textContent = name;
    editingCard.querySelector('.item-cat').textContent = category;
    editingCard.querySelector('.item-price').textContent = price;
    editingCard.querySelector('.item-meta div:last-child').textContent = quantity;
    editingCard.querySelector('.item-img-wrap img').src = image;
  } else {
    const card = createItemCard({ name, category, price, quantity, image });
    document.querySelector('.items-grid').appendChild(card);
  }

  closeItemModal();
}

function createItemCard(item){
  const card = document.createElement('div');
  card.className = 'item-card';
  card.innerHTML = `
    <div class="item-img-wrap">
      <img src="${item.image}" alt="">
    </div>
    <div class="item-body">
      <div class="item-name">${item.name}</div>
      <div class="item-cat">${item.category}</div>
      <div class="item-meta">
        <div class="item-price">${item.price}</div>
        <div>${item.quantity}</div>
      </div>
      <div class="item-actions">
        <button class="btn-edit" type="button">Edit</button>
        <button class="btn-toggle" type="button">Active</button>
        <button class="btn-delete" type="button">Delete</button>
      </div>
    </div>
  `;
  return card;
}

function editItem(button){
  const card = button.closest('.item-card');
  if(!card) return;

  editingCard = card;
  document.getElementById('item-name').value = card.querySelector('.item-name').textContent;
  document.getElementById('item-category').value = card.querySelector('.item-cat').textContent;
  document.getElementById('item-price').value = card.querySelector('.item-price').textContent;
  document.getElementById('item-quantity').value = card.querySelector('.item-meta div:last-child').textContent;
  document.getElementById('item-image').value = card.querySelector('.item-img-wrap img').src;
  document.querySelector('#item-modal .btn-add').textContent = 'Update Item';
  document.getElementById('item-modal').classList.add('show');
}

function toggleItemStatus(button){
  if(button.textContent.trim() === 'Active'){
    button.textContent = 'Inactive';
    button.style.background = '#fecaca';
  } else {
    button.textContent = 'Active';
    button.style.background = '#dcfce7';
  }
}

function deleteItem(button){
  const card = button.closest('.item-card');
  if(!card) return;
  if(confirm('Delete this item?')){
    card.remove();
  }
}

const itemsGrid = document.querySelector('.items-grid');
itemsGrid.addEventListener('click', function(event){
  const button = event.target.closest('button');
  if(!button) return;
  if(button.classList.contains('btn-edit')){
    editItem(button);
  } else if(button.classList.contains('btn-toggle')){
    toggleItemStatus(button);
  } else if(button.classList.contains('btn-delete')){
    deleteItem(button);
  }
});

</script>

</body>
</html>
