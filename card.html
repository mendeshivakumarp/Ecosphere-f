<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scrap Cards</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#ececec;
    padding:40px;
}

.container{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

.card{
    width:330px;
    background:#f5f5f5;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

/* IMAGE SPACE SAME LIKE YOUR DESIGN */
.card-image{
    width:100%;
    height:300px;
    overflow:hidden;
}

.card-image img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.card-content{
    padding:30px;
}

.card-content h2{
    font-size:42px;
    color:#1e293b;
    margin-bottom:30px;
}

.details{
    background:#e9ecef;
    padding:25px;
    border-radius:20px;
    margin-bottom:35px;
}

.details p{
    font-size:22px;
    color:#475569;
    margin-bottom:18px;
    font-weight:600;
}

.buy-btn{
    width:100%;
    padding:22px;
    border:none;
    border-radius:50px;
    background:#16a34a;
    color:white;
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.buy-btn:hover{
    background:#15803d;
}

</style>
</head>

<body>

<div class="container">

    <!-- CARD 1 -->
    <div class="card">

        <div class="card-image">
            <img src="https://images.unsplash.com/photo-1532996122724-e3c354a0b15b?w=800" alt="Iron Scrap">
        </div>

        <div class="card-content">

            <h2>Iron Scrap</h2>

            <div class="details">
                <p>👤 Verified Seller</p>
                <p>📍 Mumbai</p>
                <p>💰 ₹34/kg</p>
            </div>

            <button class="buy-btn">🛒 Buy Now</button>

        </div>
    </div>

    <!-- CARD 2 -->
    <div class="card">

        <div class="card-image">
            <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?w=800" alt="Steel Scrap">
        </div>

        <div class="card-content">

            <h2>Steel Scrap</h2>

            <div class="details">
                <p>👤 Trusted Dealer</p>
                <p>📍 Hyderabad</p>
                <p>💰 ₹42/kg</p>
            </div>

            <button class="buy-btn">🛒 Buy Now</button>

        </div>
    </div>

</div>

</body>
</html>
