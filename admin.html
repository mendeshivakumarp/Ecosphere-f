<!DOCTYPE html>
<html lang="en">
<head>
<title>Admin Dashboard - EcoSphere</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ================= GLOBAL ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
background:white;
display:flex;
flex-direction:column;
min-height:100vh;
overflow-x: hidden;
}

/* ================= HEADER ================= */
.header{
position:fixed;
top:0;
width:100%;
height:80px;
background:#12ba11;
z-index:1100;
}

.nav{
display:flex;
justify-content:space-between;
align-items:center;
max-width:1200px;
margin:auto;
padding:1rem 2rem;
}

.logo-container {
    display: flex;
    align-items: center;
    gap: 15px;
}

.logo h1{
color:white;
}

.logo i{
color:#ffd700;
}

/* HAMBURGER STYLES */
.hamburger {
    display: none; /* Hidden on desktop */
    color: white;
    font-size: 24px;
    cursor: pointer;
}

.profile-mini{
font-size:25px;
}

.profile-mini i{
color:#fff;
}

/* ================= DASHBOARD ================= */
.dashboard{
margin-top:80px;
display:flex;
flex:1;
}

/* ================= SIDEBAR ================= */
.sidebar{
width:220px;
background:#1e293b;
color:white;
padding-top:20px;
transition: 0.3s ease;
flex-shrink: 0;
}

.admin-logo{
display:flex;
align-items:center;
gap:10px;
padding:20px;
font-size:20px;
font-weight:bold;
color:#ffd700;
border-bottom:1px solid #334155;
}

.sidebar a{
display:block;
padding:12px 20px;
color:white;
text-decoration:none;
cursor:pointer;
transition:0.3s;
}

.sidebar a i{
margin-right:10px;
width: 20px;
}

.sidebar a:hover, .sidebar a.active{
background:#334155;
padding-left:25px;
}

/* ================= MAIN ================= */
.main{
flex:1;
padding:30px;
background: #f9f9f9;
min-width: 0; 
}

.header-box{
display:flex;
align-items:center;
gap:12px;
font-size:26px;
font-weight:bold;
color:#1a1a1a;
margin-bottom:20px;
}

.header-box i{
color:#12ba11;
background:#e8f5ec;
padding:10px;
border-radius:10px;
font-size:26px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-5px);
}

.card h3 {
    font-size: 16px;
    margin-bottom: 10px;
    color: #555;
}

.card p{
font-size:28px;
font-weight:bold;
color:#12ba11;
}

/* ================= TABLE ================= */
.table-container{
margin-top:30px;
background:white;
border-radius:15px;
overflow-x: auto; 
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
min-width: 600px; 
}

th,td{
padding:15px;
border-bottom:1px solid #eee;
text-align: center;
}

/* ================= FOOTER ================= */
.footer{
background:#1a1a1a;
color:white;
padding:2rem;
text-align:center;
}

/* ================= RESPONSIVE LOGIC ================= */
@media (max-width: 768px) {
    .hamburger {
        display: block;
    }

    .sidebar {
        position: fixed;
        left: -220px; 
        top: 80px;
        bottom: 0;
        z-index: 1050;
    }

    .sidebar.active {
        left: 0; 
    }

    .main {
        padding: 20px;
    }

    .cards {
        grid-template-columns: 1fr; 
    }
}

</style>
</head>

<body>

<!-- HEADER -->
<header class="header">
<nav class="nav">
    <div class="logo-container">
        <div class="hamburger" id="hamburger">
            <i class="fas fa-bars"></i>
        </div>
        <div class="logo">
            <h1><i class="fas fa-leaf"></i> EcoSphere</h1>
        </div>
    </div>

<div class="profile-mini">
<a href="admin_profile.html"><i class="fas fa-user-circle"></i></a>
</div>
</nav>
</header>

<!-- DASHBOARD -->
<div class="dashboard">

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">

<div class="admin-logo">
<i class="fas fa-user-shield"></i>
<span>Admin Panel</span>
</div>

<a href="admin.html" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
<a href="./a_users.html"><i class="fas fa-users"></i> Sellers</a>
<a href="./a_recyciier.html"><i class="fas fa-recycle"></i> Recyclers</a>
<a href="./a_products.html"><i class="fas fa-box"></i> Products</a>
<a href="./a_order.html"><i class="fas fa-shopping-cart"></i> Orders</a>
<a href="./index.html"><i class="fas fa-sign-out-alt"></i> Logout</a>

</aside>

<!-- MAIN -->
<main class="main">

<div class="header-box">
<h2><i class="fas fa-chart-line"></i> Dashboard Overview</h2>
</div>

<div class="cards">

<div class="card">
<h3>Total Sellers</h3>
<p>1,247</p>
</div>

<div class="card">
<h3>Total Products</h3>
<p>892</p>
</div>

<div class="card">
<h3>Total Orders</h3>
<p>3,456</p>
</div>

<div class="card">
<h3>Revenue</h3>
<p>₹4,52,780</p>
</div>

</div>

<!-- TABLE -->
<div class="table-container">

<table>
<thead>
<tr>
<th>SELLER</th>
<th>EMAIL</th>
<th>STATUS</th>
</tr>
</thead>

<tbody id="adminTable"></tbody>
</table>

</div>

</main>
</div>

<!-- FOOTER -->
<footer class="footer">
<p>© 2026 EcoSphere | Admin Dashboard</p>
</footer>

<script>
/* TOGGLE SIDEBAR FOR MOBILE */
const hamburger = document.getElementById('hamburger');
const sidebar = document.getElementById('sidebar');

hamburger.onclick = function() {
    sidebar.classList.toggle('active');
}

/* SAMPLE DATA */
const orders = [
{ SELLER:"Ravi Sharma",EMAIL:"ravi@email.com",STATUS:"Active"},
{ SELLER:"Priya Singh",EMAIL:"priya@email.com",STATUS:"Active"},
{ SELLER:"Anil Kumar",EMAIL:"anil@email.com",STATUS:"Inactive"},
{ SELLER:"Sunita Patel",EMAIL:"sunita@email.com",STATUS:"Active"},
{ SELLER:"Rajesh Gupta",EMAIL:"rajesh@email.com",STATUS:"Active"},
{ SELLER:"Meera Joshi",EMAIL:"meera@email.com",STATUS:"Inactive"},
{ SELLER:"Vikram Rao",EMAIL:"vikram@email.com",STATUS:"Active"}
];

/* LOAD TABLE */
function loadOrders(){
    let html="";
    orders.forEach(o=>{
        html+=`<tr>
            <td>${o.SELLER}</td>
            <td>${o.EMAIL}</td>
            <td style="color:${o.STATUS==='Active'?'green':'red'}; font-weight:bold;">${o.STATUS}</td>
        </tr>`;
    });
    document.getElementById("adminTable").innerHTML=html;
}

loadOrders();

</script>

</body>
</html>
