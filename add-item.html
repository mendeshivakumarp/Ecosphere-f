<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product Form</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-box{
            background: white;
            padding: 20px;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        .form-box h2{
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group{
            margin-bottom: 15px;
        }

        label{
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input{
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button{
            width: 100%;
            padding: 10px;
            border: none;
            background: green;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background: darkgreen;
        }
    </style>
</head>
<body>

    <div class="form-box">
        <h2>Add Product</h2>

        <form>
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" placeholder="Enter product name">
            </div>

            <div class="form-group">
                <label>Quantity</label>
                <input type="number" placeholder="Enter quantity">
            </div>

            <div class="form-group">
                <label>Product Image</label>
                <input type="file">
            </div>

            <button type="submit">Add Product</button>
        </form>
    </div>

</body>
</html>
